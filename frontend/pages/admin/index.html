<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Isaack Muchoki</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Stats cards styles */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .stat-card h3 {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: var(--spacing-md);
        }

        .stat-card p {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
        }

        /* Simple admin dashboard wrapper */
        .admin-dashboard {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: var(--spacing-lg);
        }

        .admin-dashboard h1 {
            margin-bottom: var(--spacing-lg);
        }
    </style>
</head>
<body>

  <!-- Admin Navbar -->
 <div id="admin-navbar-placeholder"></div>

  <!-- Main Content -->
  <main class="admin-main">

    <!-- Page Header -->
    <div class="admin-header">
      <h1>Projects</h1>
      <a href="/portfolio/admin/edit" class="btn-primary">
        <i class="fa-solid fa-plus"></i>&nbsp; Add Project
      </a>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="stat-label">Total Projects</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Featured</div>
        <div class="stat-value accent" id="statFeatured">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">With Live URL</div>
        <div class="stat-value" id="statLive">—</div>
      </div>
    </div>

        <!-- Future sections: recent logins, user management, etc. -->
    </div>

  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>
  <script src="../../js/admin-component.js"></script>
  <script>
    // ── Auth Check ───────────────────────────────────────────────────────────
    async function checkSession() {
      try {
        const res = await fetch('/portfolio/api/session');
        if (res.status === 401) {
          window.location.href = '/portfolio/auth/login';
          return null;
        }
        return await res.json();
      } catch {
        window.location.href = '/portfolio/auth/login';
        return null;
      }
    }

    // ── Load Projects ────────────────────────────────────────────────────────
    async function loadProjects() {
      const res  = await fetch('/portfolio/api/projects');
      const data = await res.json();
      return data.projects ?? [];
    }

    // ── Render Stats ─────────────────────────────────────────────────────────
    function renderStats(projects) {
      document.getElementById('statTotal').textContent    = projects.length;
      document.getElementById('statFeatured').textContent = projects.filter(p => p.featured).length;
      document.getElementById('statLive').textContent     = projects.filter(p => p.live_url).length;
    }

    // ── Render Table ─────────────────────────────────────────────────────────
    function renderTable(projects) {
      const body = document.getElementById('tableBody');

      if (projects.length === 0) {
        body.innerHTML = `
          <div class="empty-state">
            <i class="fa-solid fa-folder-open"></i>
            <p>No projects yet. <a href="/portfolio/admin/edit" style="color:var(--color-accent)">Add your first one.</a></p>
          </div>`;
        return;
      }

      body.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Tech Stack</th>
              <th>Featured</th>
              <th>Links</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${projects.map(p => `
              <tr>
                <td><strong>${p.title}</strong></td>
                <td>
                  <div class="tag-list">
                    ${(p.tech_stack ?? []).map(t => `<span class="tag">${t}</span>`).join('')}
                  </div>
                </td>
                <td>
                  ${p.featured
                    ? `<span class="badge-featured"><i class="fa-solid fa-star"></i> Featured</span>`
                    : `<span style="color:var(--text-muted);font-size:13px">—</span>`}
                </td>
                <td>
                  ${p.github_url ? `<a href="${p.github_url}" target="_blank" style="color:var(--color-accent);margin-right:10px" title="GitHub"><i class="fa-brands fa-github"></i></a>` : ''}
                  ${p.live_url   ? `<a href="${p.live_url}"   target="_blank" style="color:var(--color-accent)" title="Live"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>` : ''}
                  ${!p.github_url && !p.live_url ? `<span style="color:var(--text-muted);font-size:13px">—</span>` : ''}
                </td>
                <td>
                  <div class="actions">
                    <a href="/portfolio/admin/edit?id=${p.id}" class="btn-edit">
                      <i class="fa-solid fa-pen"></i> Edit
                    </a>
                    <button class="btn-delete" onclick="deleteProject('${p.id}', '${p.title.replace(/'/g, "\\'")}')">
                      <i class="fa-solid fa-trash"></i> Delete
                    </button>
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>`;
    }

    // ── Delete ───────────────────────────────────────────────────────────────
    async function deleteProject(id, title) {
      if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;

      try {
        const res  = await fetch(`/portfolio/api/projects?id=${id}`, { method: 'DELETE' });
        const data = await res.json();

                if (data.status === 'success') {
                    document.getElementById('total-users').textContent = data.data.total_users;
                    document.getElementById('verified-users').textContent = data.data.verified_users;
                    document.getElementById('total-projects').textContent = data.data.total_projects;
                    document.getElementById('featured-projects').textContent = data.data.featured_projects;
                    document.getElementById('failed-logins-24h').textContent = data.data.failed_logins_24h;
                } else {
                    console.error('Stats API returned error:', data);
                }
            } catch (err) {
                console.error('Failed to load admin stats:', err);
            }
        }

        // Run when the page loads
        document.addEventListener('DOMContentLoaded', loadAdminStats);
    </script>
</body>
</html>
