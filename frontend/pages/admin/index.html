<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Isaack Muchoki</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Stats cards styles */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .stat-card h3 {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: var(--spacing-md);
        }

        .stat-card p {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
        }

        /* Simple admin dashboard wrapper */
        .admin-dashboard {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: var(--spacing-lg);
        }

        .admin-dashboard h1 {
            margin-bottom: var(--spacing-lg);
        }
    </style>
</head>
<body>
    <!-- Admin navbar placeholder – will be loaded by admin-components.js -->
    <div id="admin-navbar-placeholder"></div>

    <div class="admin-dashboard">
        <h1>Dashboard</h1>

        <!-- Stats cards container -->
        <div class="stats-grid" id="stats-container">
            <div class="stat-card">
                <h3>Total Users</h3>
                <p id="total-users">—</p>
            </div>
            <div class="stat-card">
                <h3>Verified Users</h3>
                <p id="verified-users">—</p>
            </div>
            <div class="stat-card">
                <h3>Total Projects</h3>
                <p id="total-projects">—</p>
            </div>
            <div class="stat-card">
                <h3>Featured Projects</h3>
                <p id="featured-projects">—</p>
            </div>
            <div class="stat-card">
                <h3>Failed Logins (24h)</h3>
                <p id="failed-logins-24h">—</p>
            </div>
        </div>

        <!-- Future sections: recent logins, user management, etc. -->
    </div>

    <script src="../../js/admin-component.js"></script>
    <script>
        // Load stats from the API
        async function loadAdminStats() {
            try {
                const response = await fetch('/api/admin/stats');
                const data = await response.json();

                if (data.status === 'success') {
                    document.getElementById('total-users').textContent = data.data.total_users;
                    document.getElementById('verified-users').textContent = data.data.verified_users;
                    document.getElementById('total-projects').textContent = data.data.total_projects;
                    document.getElementById('featured-projects').textContent = data.data.featured_projects;
                    document.getElementById('failed-logins-24h').textContent = data.data.failed_logins_24h;
                } else {
                    console.error('Stats API returned error:', data);
                }
            } catch (err) {
                console.error('Failed to load admin stats:', err);
            }
        }

        // Run when the page loads
        document.addEventListener('DOMContentLoaded', loadAdminStats);
    </script>
</body>
</html>
