<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Users · KnowIsaack</title>
  <link rel="stylesheet" href="/frontend/css/main.css">
  <link rel="stylesheet" href="/frontend/css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div id="admin-navbar-placeholder"></div>

  <div class="admin-page">

    <!-- Page header -->
    <div class="admin-page-header">
      <div>
        <h1 class="admin-page-title">Users</h1>
        <p class="admin-page-subtitle">Manage registered accounts and verification status</p>
      </div>
      <button class="admin-btn-secondary" id="export-csv">
        <i class="fa-solid fa-download"></i>
        Export CSV
      </button>
    </div>

    <!-- Main card -->
    <div class="admin-card">

      <!-- Filters row -->
      <div class="admin-filters">
        <div class="admin-search-wrap">
          <i class="fa-solid fa-magnifying-glass admin-search__icon"></i>
          <input
            type="text"
            id="search-input"
            class="admin-search__input"
            placeholder="Search by name or email…"
          >
        </div>
        <select id="verified-filter" class="admin-select">
          <option value="all">All users</option>
          <option value="verified">Verified only</option>
          <option value="unverified">Unverified only</option>
        </select>
        <div class="admin-filter-meta" id="results-meta"></div>
      </div>

      <!-- Table -->
      <div class="admin-table-wrap">
        <table class="admin-table" id="users-table">
          <thead>
            <tr>
              <th style="width:48px">#</th>
              <th>Name</th>
              <th>Email</th>
              <th style="width:110px">Verified</th>
              <th style="width:130px">Joined</th>
              <th style="width:160px"></th>
            </tr>
          </thead>
          <tbody id="users-table-body">
            <tr>
              <td colspan="6" class="admin-table__loading">
                <i class="fa-solid fa-circle-notch fa-spin"></i> Loading users…
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="admin-pagination">
        <button class="admin-pagination__btn" id="prev-page" disabled>
          <i class="fa-solid fa-chevron-left"></i> Previous
        </button>
        <span class="admin-pagination__info" id="page-info">Page 1 of 1</span>
        <button class="admin-pagination__btn" id="next-page" disabled>
          Next <i class="fa-solid fa-chevron-right"></i>
        </button>
      </div>

    </div>
  </div>

  <!-- Delete confirm modal -->
  <div class="admin-modal-overlay" id="delete-modal" style="display:none">
    <div class="admin-modal">
      <div class="admin-modal__icon admin-modal__icon--danger">
        <i class="fa-solid fa-user-xmark"></i>
      </div>
      <h2 class="admin-modal__title">Delete user?</h2>
      <p class="admin-modal__body" id="delete-modal-body">
        This will permanently remove the user and all associated data. This action cannot be undone.
      </p>
      <div class="admin-modal__actions">
        <button class="admin-btn-ghost" id="delete-cancel">Cancel</button>
        <button class="admin-btn-danger" id="delete-confirm">
          <i class="fa-solid fa-trash"></i> Delete
        </button>
      </div>
    </div>
  </div>

  <!-- Resend confirm modal -->
  <div class="admin-modal-overlay" id="resend-modal" style="display:none">
    <div class="admin-modal">
      <div class="admin-modal__icon admin-modal__icon--info">
        <i class="fa-solid fa-envelope"></i>
      </div>
      <h2 class="admin-modal__title">Resend verification?</h2>
      <p class="admin-modal__body" id="resend-modal-body">
        A new verification email will be sent to this user.
      </p>
      <div class="admin-modal__actions">
        <button class="admin-btn-ghost" id="resend-cancel">Cancel</button>
        <button class="admin-btn-primary" id="resend-confirm">
          <i class="fa-solid fa-paper-plane"></i> Send email
        </button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="admin-toast" role="alert" aria-live="polite"></div>

  <script src="/frontend/js/admin-component.js"></script>
  <script src="/frontend/js/admin-users.js"></script>
</body>
</html>
