<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Login Activity · KnowIsaack</title>
  <link rel="stylesheet" href="/frontend/css/main.css">
  <link rel="stylesheet" href="/frontend/css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div id="admin-navbar-placeholder"></div>

  <div class="admin-page">

    <!-- Page header -->
    <div class="admin-page-header">
      <div>
        <h1 class="admin-page-title">Login Activity</h1>
        <p class="admin-page-subtitle">All authentication attempts across the platform</p>
      </div>
      <button class="admin-btn-secondary" id="export-csv">
        <i class="fa-solid fa-download"></i>
        Export CSV
      </button>
    </div>

    <!-- Main card -->
    <div class="admin-card">

      <!-- Filters row -->
      <div class="admin-filters">
        <div class="admin-search-wrap">
          <i class="fa-solid fa-magnifying-glass admin-search__icon"></i>
          <input
            type="text"
            id="search-input"
            class="admin-search__input"
            placeholder="Search by user, email, IP address…"
          >
        </div>

        <select id="success-filter" class="admin-select">
          <option value="all">All attempts</option>
          <option value="success">Successful</option>
          <option value="failed">Failed</option>
        </select>

        <div class="admin-date-range">
          <div class="admin-date-wrap">
            <i class="fa-solid fa-calendar admin-date__icon"></i>
            <input type="date" id="date-from" class="admin-date__input" title="From date">
          </div>
          <span class="admin-date-sep">—</span>
          <div class="admin-date-wrap">
            <i class="fa-solid fa-calendar admin-date__icon"></i>
            <input type="date" id="date-to" class="admin-date__input" title="To date">
          </div>
          <button class="admin-date-clear" id="clear-dates" title="Clear date range">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <div class="admin-filter-meta" id="results-meta"></div>
      </div>

      <!-- Table -->
      <div class="admin-table-wrap">
        <table class="admin-table" id="logs-table">
          <thead>
            <tr>
              <th style="width:48px">#</th>
              <th>User</th>
              <th>Email attempted</th>
              <th>IP address</th>
              <th style="width:110px">Result</th>
              <th style="width:160px">Date / time</th>
            </tr>
          </thead>
          <tbody id="logs-table-body">
            <tr>
              <td colspan="6" class="admin-table__loading">
                <i class="fa-solid fa-circle-notch fa-spin"></i> Loading logs…
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="admin-pagination">
        <button class="admin-pagination__btn" id="prev-page" disabled>
          <i class="fa-solid fa-chevron-left"></i> Previous
        </button>
        <span class="admin-pagination__info" id="page-info">Page 1 of 1</span>
        <button class="admin-pagination__btn" id="next-page" disabled>
          Next <i class="fa-solid fa-chevron-right"></i>
        </button>
      </div>

    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="admin-toast" role="alert" aria-live="polite"></div>

  <script src="/frontend/js/admin-component.js"></script>
  <script src="/frontend/js/admin-logs.js"></script>
</body>
</html>
