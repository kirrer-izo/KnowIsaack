<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Projects</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Copy the same CSS from users.html – adjust if needed */
    .projects-container {
      max-width: var(--container-width);
      margin: 0 auto;
      padding: var(--spacing-lg);
    }
    .projects-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-lg);
    }
    .btn-add {
      background: var(--color-accent);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }
    .filters {
      display: flex;
      gap: var(--spacing-md);
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: var(--spacing-lg);
    }
    .search-input {
      width: 250px;
      height: 36px;
      padding: 0 var(--spacing-md);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-sm);
    }
    .filter-select {
      height: 36px;
      padding: 0 var(--spacing-md);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-sm);
      background: var(--bg-card);
    }
    .btn-export {
      background: var(--color-neutral-100);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-export:hover {
      background: var(--color-neutral-200);
    }
    .table-container {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-md);
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: var(--spacing-md);
      text-align: left;
      border-bottom: 1px solid var(--border-card);
    }
    th {
      background: var(--color-neutral-100);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    td {
      font-size: 14px;
      color: var(--text-body);
    }
    .tech-stack-cell {
      max-width: 200px;
      white-space: normal;
      word-break: break-word;
    }
    .actions {
      display: flex;
      gap: 8px;
    }
    .btn-edit {
      background: none;
      border: none;
      color: var(--color-accent);
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
    }
    .btn-edit:hover {
      text-decoration: underline;
    }
    .btn-delete {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-delete:hover {
      text-decoration: underline;
    }
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: var(--spacing-md);
      margin-top: var(--spacing-lg);
    }
    .pagination button {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      cursor: pointer;
    }
    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: var(--spacing-md) var(--spacing-lg);
      border-radius: var(--radius-sm);
      font-weight: 600;
      z-index: 9999;
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .toast.success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }
    .toast.error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="admin-navbar-placeholder"></div>

  <div class="projects-container">
    <div class="projects-header">
      <h1>Manage Projects</h1>
      <a href="/admin/edit" class="btn-add">
        <i class="fa-solid fa-plus"></i> Add Project
      </a>
    </div>

    <div class="filters">
      <input type="text" id="search-input" class="search-input" placeholder="Search by title or description...">
      <select id="featured-filter" class="filter-select">
        <option value="all">All projects</option>
        <option value="featured">Featured only</option>
        <option value="not-featured">Not featured</option>
      </select>
      <button class="btn-export" id="export-csv">
        <i class="fa-solid fa-download"></i> Export CSV
      </button>
    </div>

    <div class="table-container">
      <table id="projects-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Description</th>
            <th>Tech Stack</th>
            <th>Featured</th>
            <th>Created At</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="projects-table-body">
          <tr><td colspan="7" style="text-align: center;">Loading projects...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="pagination" id="pagination-controls">
      <button id="prev-page" disabled>Previous</button>
      <span id="page-info">Page 1 of 1</span>
      <button id="next-page" disabled>Next</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="../../js/admin-component.js"></script>
  <script src="../../js/admin-project.js"></script>
</body>
</html>
