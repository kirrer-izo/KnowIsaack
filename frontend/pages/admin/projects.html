<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Projects · KnowIsaack</title>
  <link rel="stylesheet" href="/frontend/css/main.css">
  <link rel="stylesheet" href="/frontend/css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div id="admin-navbar-placeholder"></div>

  <div class="admin-page">

    <!-- Page header -->
    <div class="admin-page-header">
      <div>
        <h1 class="admin-page-title">Projects</h1>
        <p class="admin-page-subtitle">Manage your portfolio projects</p>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="admin-btn-secondary" id="export-csv">
          <i class="fa-solid fa-download"></i>
          Export CSV
        </button>
        <a href="/admin/edit" class="admin-btn-primary">
          <i class="fa-solid fa-plus"></i>
          Add project
        </a>
      </div>
    </div>

    <!-- Main card -->
    <div class="admin-card">

      <!-- Filters row -->
      <div class="admin-filters">
        <div class="admin-search-wrap">
          <i class="fa-solid fa-magnifying-glass admin-search__icon"></i>
          <input
            type="text"
            id="search-input"
            class="admin-search__input"
            placeholder="Search by title or description…"
          >
        </div>
        <select id="featured-filter" class="admin-select">
          <option value="all">All projects</option>
          <option value="featured">Featured only</option>
          <option value="not-featured">Not featured</option>
        </select>
        <div class="admin-filter-meta" id="results-meta"></div>
      </div>

      <!-- Table -->
      <div class="admin-table-wrap">
        <table class="admin-table" id="projects-table">
          <thead>
            <tr>
              <th style="width:48px">#</th>
              <th>Title</th>
              <th>Description</th>
              <th>Tech stack</th>
              <th style="width:100px">Status</th>
              <th style="width:130px">Created</th>
              <th style="width:100px"></th>
            </tr>
          </thead>
          <tbody id="projects-table-body">
            <tr>
              <td colspan="7" class="admin-table__loading">
                <i class="fa-solid fa-circle-notch fa-spin"></i> Loading projects…
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="admin-pagination">
        <button class="admin-pagination__btn" id="prev-page" disabled>
          <i class="fa-solid fa-chevron-left"></i> Previous
        </button>
        <span class="admin-pagination__info" id="page-info">Page 1 of 1</span>
        <button class="admin-pagination__btn" id="next-page" disabled>
          Next <i class="fa-solid fa-chevron-right"></i>
        </button>
      </div>

    </div>
  </div>

  <!-- Delete confirm modal -->
  <div class="admin-modal-overlay" id="delete-modal" style="display:none">
    <div class="admin-modal">
      <div class="admin-modal__icon admin-modal__icon--danger">
        <i class="fa-solid fa-trash"></i>
      </div>
      <h2 class="admin-modal__title">Delete project?</h2>
      <p class="admin-modal__body" id="delete-modal-body">
        This will permanently remove the project. This action cannot be undone.
      </p>
      <div class="admin-modal__actions">
        <button class="admin-btn-ghost" id="delete-cancel">Cancel</button>
        <button class="admin-btn-danger" id="delete-confirm">
          <i class="fa-solid fa-trash"></i> Delete
        </button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="admin-toast" role="alert" aria-live="polite"></div>

  <script src="/frontend/js/admin-component.js"></script>
  <script src="/frontend/js/admin-project.js"></script>
</body>
</html>
