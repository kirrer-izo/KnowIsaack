<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Rate Limits · KnowIsaack</title>
  <link rel="stylesheet" href="/frontend/css/main.css">
  <link rel="stylesheet" href="/frontend/css/admin.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div id="admin-navbar-placeholder"></div>

  <div class="admin-page">

    <!-- Page header -->
    <div class="admin-page-header">
      <div>
        <h1 class="admin-page-title">Rate Limits</h1>
        <p class="admin-page-subtitle">Monitor blocked IPs and throttled identifiers</p>
      </div>
      <button class="admin-btn-secondary" id="export-csv">
        <i class="fa-solid fa-download"></i>
        Export CSV
      </button>
    </div>

    <!-- Summary stat cards -->
    <div class="stats-grid stats-grid--3" id="rate-stats">
      <div class="stat-card stat-card--red">
        <div class="stat-card__accent"></div>
        <div class="stat-card__icon"><i class="fa-solid fa-ban"></i></div>
        <div class="stat-card__label">Blocked identifiers</div>
        <div class="stat-card__value" id="stat-total">—</div>
        <div class="stat-card__delta stat-card__delta--neutral">Active right now</div>
      </div>
      <div class="stat-card stat-card--amber">
        <div class="stat-card__accent"></div>
        <div class="stat-card__icon"><i class="fa-solid fa-right-to-bracket"></i></div>
        <div class="stat-card__label">Login blocks</div>
        <div class="stat-card__value" id="stat-login">—</div>
        <div class="stat-card__delta stat-card__delta--neutral">action: login</div>
      </div>
      <div class="stat-card stat-card--purple">
        <div class="stat-card__accent"></div>
        <div class="stat-card__icon"><i class="fa-solid fa-key"></i></div>
        <div class="stat-card__label">Password reset blocks</div>
        <div class="stat-card__value" id="stat-reset">—</div>
        <div class="stat-card__delta stat-card__delta--neutral">action: forgot_password</div>
      </div>
    </div>

    <!-- Main card -->
    <div class="admin-card">

      <!-- Filters row -->
      <div class="admin-filters">
        <div class="admin-search-wrap">
          <i class="fa-solid fa-magnifying-glass admin-search__icon"></i>
          <input
            type="text"
            id="search-input"
            class="admin-search__input"
            placeholder="Search by IP address or email…"
          >
        </div>
        <select id="action-filter" class="admin-select">
          <option value="all">All actions</option>
          <option value="login">Login attempts</option>
          <option value="forgot_password">Password reset</option>
        </select>
        <div class="admin-filter-meta" id="results-meta"></div>
      </div>

      <!-- Table -->
      <div class="admin-table-wrap">
        <table class="admin-table" id="rate-limits-table">
          <thead>
            <tr>
              <th style="width:48px">#</th>
              <th>Identifier</th>
              <th style="width:160px">Action</th>
              <th style="width:120px">Attempts</th>
              <th style="width:150px">First attempt</th>
              <th style="width:150px">Last attempt</th>
            </tr>
          </thead>
          <tbody id="rate-limits-table-body">
            <tr>
              <td colspan="6" class="admin-table__loading">
                <i class="fa-solid fa-circle-notch fa-spin"></i> Loading rate limits…
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="admin-pagination">
        <button class="admin-pagination__btn" id="prev-page" disabled>
          <i class="fa-solid fa-chevron-left"></i> Previous
        </button>
        <span class="admin-pagination__info" id="page-info">Page 1 of 1</span>
        <button class="admin-pagination__btn" id="next-page" disabled>
          Next <i class="fa-solid fa-chevron-right"></i>
        </button>
      </div>

    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="admin-toast" role="alert" aria-live="polite"></div>

  <script src="/frontend/js/admin-component.js"></script>
  <script src="/frontend/js/admin-rate-limits.js"></script>
</body>
</html>
