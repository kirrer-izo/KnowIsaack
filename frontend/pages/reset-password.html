  <style>

    }
    .form-label {
      display: block;

    .form-input {

<body>
  <div class="mesh-gradient"></div>

  <div class="login-wrapper">
    <div class="login-card reveal is-visible">
      <span class="label">PORTFOLIO</span>
      <h1>Set a new <span class="color-accent">password</span></h1>
      <p>Create a strong password for your account.</p>

      <div class="login-error" id="resetError"></div>

      <form action="/auth/reset-password" method="POST" id="resetForm">
        <input type="hidden" name="token" value="<?php echo htmlspecialchars($_GET['token'] ?? ''); ?>">

        <div class="form-group">
          <label class="form-label" for="password">New password</label>
          <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" required>
          <p id="strengthLabel" style="font-size: 13px; margin-top: 6px;"></p>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm_password">Confirm new password</label>
          <input class="form-input" type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
          <p id="matchLabel" style="font-size: 13px; margin-top: 6px;"></p>
        </div>

        <button type="submit" class="btn-submit">Reset password</button>
      </form>

      <p class="login-link">
        <a href="/auth/login">Back to sign in</a>
      </p>

      <p class="login-divider">——</p>

      <a href="/" class="back-link">
        <i class="fa-solid fa-arrow-left"></i>
        Back to portfolio
      </a>
    </div>
  </div>

  <script>
    // Handle query params
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    const errorEl = document.getElementById('resetError');
    const token = params.get('token');

    const errorMessages = {
      missing_fields: 'Please fill in all fields.',
      password_too_short: 'Password must be at least 8 characters.',
      password_no_uppercase: 'Password must contain at least one uppercase letter.',
      password_no_lowercase: 'Password must contain at least one lowercase letter.',
      password_no_number: 'Password must contain at least one number.',
      password_no_special: 'Password must contain at least one special character.',
      invalid_token: 'Invalid reset link.',
      token_expired: 'Reset link has expired. Please request a new one.',
      passwords_do_not_match: 'Passwords do not match.',
    };

    if (error) {
      errorEl.textContent = errorMessages[error] || decodeURIComponent(error);
      errorEl.classList.add('visible');

      setTimeout(() => {
        errorEl.classList.remove('visible');
      }, 4000);
    }

    // Password strength validation
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirm_password');
    const strengthLabel = document.getElementById('strengthLabel');
    const matchLabel = document.getElementById('matchLabel');

    if (passwordInput) {
      let strength = 0;
      passwordInput.addEventListener('input', () => {
        const value = passwordInput.value;
        strength = 0;
        if (value.length === 0) {
          passwordInput.style.borderColor = 'var(--border-card)';
          strengthLabel.textContent = '';
          return;
        }

        if (value.length >= 8) strength++;
        if (/[A-Z]/.test(value)) strength++;
        if (/[a-z]/.test(value)) strength++;
        if (/\d/.test(value)) strength++;
        if (/[@$!%*?&]/.test(value)) strength++;

        if (strength <= 2) {
          passwordInput.style.borderColor = '#f87171';
          strengthLabel.textContent = 'Weak password';
          strengthLabel.style.color = '#f87171';
        } else if (strength === 3 || strength === 4) {
          passwordInput.style.borderColor = '#fbbf24';
          strengthLabel.textContent = 'Moderate password';
          strengthLabel.style.color = '#fbbf24';
        } else {
          passwordInput.style.borderColor = '#34d399';
          strengthLabel.textContent = 'Strong password';
          strengthLabel.style.color = '#34d399';
        }

        // Check confirm match
        if (confirmPasswordInput.value.length > 0) {
          if (passwordInput.value !== confirmPasswordInput.value) {
            confirmPasswordInput.style.borderColor = '#f87171';
            matchLabel.textContent = 'Passwords do not match';
            matchLabel.style.color = '#f87171';
          } else {
            confirmPasswordInput.style.borderColor = '#34d399';
            matchLabel.textContent = '';
          }
        }
      });

      confirmPasswordInput.addEventListener('input', () => {
        if (passwordInput.value !== confirmPasswordInput.value) {
          confirmPasswordInput.style.borderColor = '#f87171';
          matchLabel.textContent = 'Passwords do not match';
          matchLabel.style.color = '#f87171';
        } else {
          confirmPasswordInput.style.borderColor = '#34d399';
          matchLabel.textContent = '';
        }
      });

      // Form submission guard
      const form = document.getElementById('resetForm');
      form.addEventListener('submit', (event) => {
        if (strength < 4) {
          event.preventDefault();
          errorEl.textContent = 'Please choose a stronger password.';
          errorEl.classList.add('visible');
        }
        if (passwordInput.value !== confirmPasswordInput.value) {
          event.preventDefault();
          errorEl.textContent = 'Passwords do not match.';
          errorEl.classList.add('visible');
        }
      });
    }
  </script>
</body>
</html>
