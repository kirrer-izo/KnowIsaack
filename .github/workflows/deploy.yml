name: Deploy to Render

on:
  push:
    branches:
      - master

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: knowisaack_test
          POSTGRES_PASSWORD: password
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql, mbstring
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: PHP syntax check
        run: |
          find . -name "*.php" \
            -not -path "./vendor/*" \
            -print0 | xargs -0 php -l

      - name: Setup Database Schema from Migrations
        run: |
          # Loop through all .sql files in order and apply them to the test DB
          # Adjust the path below if your migrations folder is named differently
          for f in backend/Infrastructure/Database/migrations/*.sql; do
            echo "Applying migration: $f"
            PGPASSWORD=password psql -h localhost -p 5432 -U postgres -d knowisaack_test -f "$f"
          done

      - name: Run Tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_DATABASE_TEST: knowisaack_test
          DB_USER: postgres
          DB_PASS: password
        run: vendor/bin/phpunit

  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Deploy via Render hook
        run: |
          curl --silent --show-error --fail \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"