name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_database
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql, mbstring
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: PHP syntax check
        run: find . -name "*.php" \
               -not -path "./vendor/*" \
               -print0 | xargs -0 php -l

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in {1..10}; do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/10)"
            sleep 3
          done

      - name: Setup Database Schema from Migrations
        run: |
          for f in backend/Infrastructure/Database/migrations/*.sql; do
            echo "Applying migration: $f"
            PGPASSWORD=postgres psql -h localhost -p 5432 -U postgres -d test_database -f "$f"
          done

      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --configuration phpunit.xml
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASS: postgres
          DB_DATABASE_TEST: test_database