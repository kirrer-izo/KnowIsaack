services:
  portfolio:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor # This tells Docker: "Don't overwrite this folder with the host contents"
    env_file:
      - .env #This tells Docker to load variables from your .env file
    depends_on:
      - db
  
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: Africa/Nairobi
      PGTZ: Africa/Nairobi
    volumes:
      - db_data:/var/lib/postgresql/data
  
volumes:
  db_data: